# ── Whisper STT Model ────────────────────────────────────────────
# model_size: tiny, base, small, medium, large-v2, large-v3, distil-large-v3
# device: cpu, cuda, auto
# compute_type: int8, float16, float32, int8_float16 (float16/int8_float16 require CUDA)
whisper:
  engine: "mlx"                   # "faster-whisper" or "mlx"
  model_size: "small"
  device: "cpu"
  compute_type: "int8"
  mlx_model: "mlx-community/whisper-small-mlx"  # HuggingFace repo (mlx engine only)

# ── Gipformer STT Model (Vietnamese only) ───────────────────────
gipformer:
  enabled_for_vietnamese: true
  repo_id: "g-group-ai-lab/gipformer-65M-rnnt"
  quantize: "int8"                # "fp32" or "int8"
  num_threads: 4
  feature_dim: 80
  sample_rate: 16000
  decoding_method: "modified_beam_search"

# ── Transcription ────────────────────────────────────────────────
transcription:
  beam_size: 1
  best_of: 1
  vad_filter: true
  no_speech_threshold: 0.6              # skip segments with high no-speech probability
  compression_ratio_threshold: 2.4      # skip segments with abnormal compression (hallucination)
  log_prob_threshold: -1.0              # skip segments with very low avg log probability

# ── VAD (Voice Activity Detection) ──────────────────────────────
vad:
  threshold: 0.15
  min_speech_ms: 150
  silence_duration_ms: 300    # silence after speech triggers segment cut
  max_segment_s: 5            # short segments = faster processing + less latency
  interim_interval_s: 1.0     # send partial STT every N seconds while speaking

# ── Translation (NLLB offline) ─────────────────────────────────
translation:
  model: "OpenNMT/nllb-200-distilled-1.3B-ct2-int8"
  tokenizer: "facebook/nllb-200-distilled-1.3B"
  device: "cpu"
  compute_type: "int8"
  inter_threads: 1
  intra_threads: 8
  beam_size: 2
  max_decoding_length: 100

# Supported languages
languages:
  - "en"
  - "zh"
  - "ja"
  - "ko"
  - "vi"
  - "es"
  - "fr"
  - "de"
  - "pt"
  - "ru"
  - "ar"
  - "hi"
  - "th"
  - "id"
  - "ms"
  - "tl"
  - "it"
  - "nl"
  - "pl"
  - "tr"
  - "uk"
  - "sv"
