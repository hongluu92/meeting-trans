# ── Whisper STT Model ────────────────────────────────────────────
# model_size: tiny, base, small, medium, large-v2, large-v3, distil-large-v3
# device: cpu, cuda, auto
# compute_type: int8, float16, float32, int8_float16 (float16/int8_float16 require CUDA)
whisper:
  model_size: "small"
  device: "cpu"
  compute_type: "int8"

# ── Transcription ────────────────────────────────────────────────
transcription:
  beam_size: 1
  best_of: 1
  vad_filter: true

# ── VAD (Voice Activity Detection) ──────────────────────────────
vad:
  threshold: 0.15
  min_speech_ms: 250

# ── Translation ─────────────────────────────────────────────────
# Supported languages (add more as needed)
languages:
  - "en"
  - "ja"
  - "vi"
