# ── Whisper STT Model ────────────────────────────────────────────
# model_size: tiny, base, small, medium, large-v2, large-v3, distil-large-v3
# device: cpu, cuda, auto
# compute_type: int8, float16, float32, int8_float16 (float16/int8_float16 require CUDA)
whisper:
  engine: "mlx"                   # "faster-whisper" or "mlx"
  model_size: "base"
  device: "cpu"
  compute_type: "int8"
  mlx_model: "mlx-community/whisper-base-mlx"  # HuggingFace repo (mlx engine only)

# ── Transcription ────────────────────────────────────────────────
transcription:
  beam_size: 1
  best_of: 1
  vad_filter: true

# ── VAD (Voice Activity Detection) ──────────────────────────────
vad:
  threshold: 0.15
  min_speech_ms: 250
  silence_duration_ms: 350    # silence after speech triggers segment cut
  max_segment_s: 15           # force-cut long continuous speech
  interim_interval_s: 0.5     # send partial STT every N seconds while speaking

# ── Translation ─────────────────────────────────────────────────
# Supported languages (add more as needed)
languages:
  - "en"
  - "ja"
  - "vi"
  - "ko"
